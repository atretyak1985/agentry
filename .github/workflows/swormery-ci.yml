name: swormery-ci

on:
  push:
    branches: [main, 'feat/**']
    paths: ['tools/swormery/**', '.github/workflows/swormery-ci.yml']
  pull_request:
    branches: [main, 'feat/**']
    paths: ['tools/swormery/**', '.github/workflows/swormery-ci.yml']

defaults:
  run:
    working-directory: tools/swormery

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tools/swormery/web/package-lock.json

      - name: Build web
        working-directory: tools/swormery/web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/swormery/go.mod
          check-latest: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build binary
        run: go build -o swormery ./cmd/swormery
