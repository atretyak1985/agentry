<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0E0F12" />
    <title>Swarmery</title>
    <!-- Canvas type triad (Canvas.dc.html helmet): Fraunces editorial serif for
         display/headlines, Inter dashboard sans, JetBrains Mono labels/data. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Pre-paint theme (Fusion phase 16): resolve {mode, palette} from
         localStorage and apply data-mode / data-theme / data-palette on <html>
         plus the page background BEFORE the stylesheet loads, so there is no
         flash-of-wrong-theme. The bg lookup mirrors --color-bg in index.css for
         every palette × resolved-mode; index.css takes over once loaded. -->
    <script>
      (function () {
        var BG = {
          'swarm:dark': '#0e0f12', 'swarm:light': '#f6f2ea',
          'ocean:dark': '#0b0f14', 'ocean:light': '#eef3f7',
          'forest:dark': '#0c1210', 'forest:light': '#eef4ee',
          'sunset:dark': '#140d0e', 'sunset:light': '#f7efea',
          'zen:dark': '#101214', 'zen:light': '#f4f5f6',
          'ember:dark': '#120e0c', 'ember:light': '#f6f1ec'
        };
        var mode = 'system';
        var palette = 'swarm';
        try {
          var raw = localStorage.getItem('swarmery.theme');
          if (raw === 'light' || raw === 'dark') {
            mode = raw;
          } else if (raw) {
            var p = JSON.parse(raw);
            if (p && (p.mode === 'light' || p.mode === 'dark' || p.mode === 'system')) mode = p.mode;
            if (p && BG[p.palette + ':dark']) palette = p.palette;
          }
        } catch (e) {
          /* storage/JSON blocked — defaults apply */
        }
        var dark = mode === 'dark';
        if (mode === 'system') {
          try {
            dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          } catch (e) {
            dark = true;
          }
        }
        var resolved = dark ? 'dark' : 'light';
        var el = document.documentElement;
        el.dataset.mode = resolved;
        el.dataset.theme = resolved;
        el.dataset.palette = palette;
        var bg = BG[palette + ':' + resolved] || '#0e0f12';
        el.style.background = bg;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', bg);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
